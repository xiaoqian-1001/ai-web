<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>极简音乐站</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      min-height:100vh;
      background:#0f1118;
      color:#fff;
      font-family:system-ui,"PingFang SC",sans-serif;
    }
    .glass{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
    }
    .progress-bar{cursor:pointer;}
    .progress-bar:hover .thumb{transform:scale(1);}
    .thumb{
      width:12px;height:12px;
      background:#a855f7;
      border-radius:50%;
      transform:scale(0);
      transition:.2s;
    }
    .song-item:hover{background:rgba(255,255,255,0.06);}
    .active-song{background:rgba(168,85,247,0.15);border-left:3px solid #a855f7;}
  </style>
</head>
<body>
<div id="app" class="container mx-auto px-3 py-6 max-w-5xl">
  <!-- 头部 -->
  <div class="text-center mb-8">
    <h1 class="text-[28px] font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
      免费音乐播放器
    </h1>
    <p class="text-white/50 text-sm mt-2">全网音源 · 无损播放 · 可拖拽进度</p>
  </div>

  <!-- 搜索 -->
  <div class="glass p-4 mb-6">
    <div class="flex gap-3">
      <input v-model="kw" @keyup.enter="search" type="text" placeholder="输入歌名/歌手搜索"
        class="flex-1 bg-white/10 border border-white/15 rounded-lg px-4 py-3 text-white outline-none focus:border-purple-400"/>
      <button @click="search" class="bg-purple-600 hover:bg-purple-700 px-5 py-3 rounded-lg font-medium transition">
        搜索
      </button>
    </div>
  </div>

  <!-- 正在播放 -->
  <div v-if="playInfo.title" class="glass p-5 mb-6">
    <div class="flex items-center gap-4">
      <img :src="playInfo.cover" class="w-24 h-24 rounded-xl object-cover" />
      <div class="flex-1">
        <h2 class="text-lg font-medium">{{ playInfo.title }}</h2>
        <p class="text-white/50 text-sm mt-1">{{ playInfo.author }}</p>
        
        <!-- 自定义进度条 -->
        <div class="progress-bar relative h-1.5 bg-white/20 rounded-full mt-4" @click="seek">
          <div class="absolute left-0 top-0 h-full bg-purple-500 rounded-full" :style="{width: progress + '%'}"></div>
          <div class="thumb absolute top-1/2 -translate-y-1/2" :style="{left: progress + '%'}"></div>
        </div>
        <div class="flex justify-between text-xs text-white/40 mt-2">
          <span>{{formatTime(currentTime)}}</span>
          <span>{{formatTime(duration)}}</span>
        </div>

        <!-- 控制按钮 -->
        <div class="flex items-center gap-4 mt-3">
          <button @click="togglePlay" class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center">
            <span v-if="isPlay">⏸</span>
            <span v-else>▶</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 歌单列表 -->
  <div class="glass p-4">
    <div class="text-white/70 mb-3">搜索结果</div>
    <div class="max-h-[500px] overflow-y-auto">
      <div v-for="(item,idx) in list" :key="idx"
        @click="play(item)"
        class="song-item flex items-center gap-3 p-3 rounded-lg transition"
        :class="playInfo.id===item.id?'active-song':''">
        <img :src="item.cover" class="w-12 h-12 rounded-lg object-cover"/>
        <div class="flex-1 min-w-0">
          <div class="truncate">{{item.title}}</div>
          <div class="text-white/50 text-sm truncate">{{item.author}}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 音频标签 -->
  <audio ref="audio" crossorigin="anonymous"
    @timeupdate="timeUpdate"
    @loadedmetadata="loadMeta"
    @ended="nextPlay">
</div>

<script>
const {createApp,ref} = Vue;
createApp({
  setup(){
    const kw = ref('');
    const list = ref([]);
    const audio = ref(null);
    const isPlay = ref(false);
    const currentTime = ref(0);
    const duration = ref(0);
    const progress = ref(0);
    const playInfo = ref({});

    // 格式化时间
    const formatTime = (s)=>{
      if(isNaN(s)) return '00:00';
      let m = Math.floor(s/60);
      let ss = Math.floor(s%60);
      return `${String(m).padStart(2,0)}:${String(ss).padStart(2,0)}`;
    };

    // 搜索 + 解析歌单
    const search = async ()=>{
      if(!kw.value)return;
      const res = await fetch(`https://api.injahow.cn/api/music/search?key=${encodeURIComponent(kw.value)}`);
      const data = await res.json();
      list.value = data.data || [];
    };

    // 播放歌曲
    const play = async (item)=>{
      const res = await fetch(`https://api.injahow.cn/api/music/url?id=${item.id}`);
      const d = await res.json();
      audio.value.src = d.url;
      audio.value.play();
      isPlay.value = true;
      playInfo.value = item;
    };

    // 播放/暂停
    const togglePlay = ()=>{
      if(isPlay.value){
        audio.value.pause();
      }else{
        audio.value.play();
      }
      isPlay.value = !isPlay.value;
    };

    // 进度更新
    const timeUpdate = ()=>{
      currentTime.value = audio.value.currentTime;
      progress.value = (audio.value.currentTime / audio.value.duration) * 100 || 0;
    };
    const loadMeta = ()=> duration.value = audio.value.duration;

    // 点击进度条跳转
    const seek = (e)=>{
      const rect = e.currentTarget.getBoundingClientRect();
      let per = (e.clientX - rect.left) / rect.width;
      audio.value.currentTime = per * audio.value.duration;
    };

    // 下一首
    const nextPlay = ()=>{
      let idx = list.value.findIndex(v=>v.id===playInfo.value.id);
      if(idx < list.value.length-1) play(list.value[idx+1]);
    };

    return{kw,list,audio,isPlay,currentTime,duration,progress,playInfo,
      search,play,togglePlay,timeUpdate,loadMeta,seek,nextPlay,formatTime}
  }
}).mount('#app')
</script>
</body>
</html>

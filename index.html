<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小钱音乐站 - Game song list</title>

<!-- APlayer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

<!-- MetingJS -->
<script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 50px;
    font-size: 30px;
    font-weight: 800;
}

p {
    opacity: 0.85;
    margin-top: 10px;
}

.music-box {
    max-width: 900px;
    margin: 50px auto;
    padding: 0 15px;
}

/* 底部说明 */
.footer {
    margin-top: 50px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<h1>🎧 小钱音乐站</h1>
<p>🎮 Game song list | 免费在线听歌</p>

<div class="music-box">

<!-- 🎵 播放器（你的歌单） -->
<meting-js
    server="netease"
    type="playlist"
    id="10535657434"
    fixed="false"
    autoplay="false"
    theme="#4a6cf7"
    loop="all"
    order="random"
    preload="auto"
    volume="0.7">
</meting-js>

</div>

<div class="footer">
© 2026 小钱音乐站 | 持续更新中
</div>

</body>
</html>

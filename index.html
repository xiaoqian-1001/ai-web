<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小钱音乐 Final v2</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<style>
body{
background: radial-gradient(circle,#1e1b4b,#020617);
color:#fff;
overflow-x:hidden;
}
.scroll::-webkit-scrollbar{display:none}
.card:hover{transform:scale(1.05);transition:.3s}

/* 歌词渐隐 */
.lyric-mask{
mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
}
</style>
</head>

<body>
<div id="app" class="pb-28 max-w-6xl mx-auto">

<!-- 顶部 -->
<div class="p-4">
<h1 class="text-3xl font-bold text-purple-400">🎧 小钱音乐 Final</h1>
</div>

<!-- 搜索 -->
<div class="px-4">
<input v-model="keyword" @keyup.enter="search"
class="w-full p-3 rounded bg-white/10 border border-white/10"
placeholder="搜索音乐...">
</div>

<!-- 榜单 -->
<div class="px-4 mt-6">
<h2 class="mb-3">🔥 热门榜单</h2>
<div class="flex gap-4 overflow-x-auto scroll">
<div v-for="s in hotSongs" @click="play(s)"
class="min-w-[140px] cursor-pointer">
<img :src="s.artwork" class="h-36 w-full object-cover rounded">
<div class="text-sm truncate">{{s.title}}</div>
<div class="text-xs text-white/50">{{s.artist}}</div>
</div>
</div>
</div>

<!-- 搜索结果 -->
<div class="px-4 mt-6 grid grid-cols-2 md:grid-cols-4 gap-4">
<div v-for="s in songs" @click="play(s)"
class="card p-2 bg-white/5 rounded cursor-pointer">
<img :src="s.artwork" class="h-32 w-full object-cover rounded mb-2">
<div class="text-sm truncate">{{s.title}}</div>
<div class="text-xs text-white/50">{{s.artist}}</div>
</div>
</div>

<!-- 歌词（沉浸式） -->
<div v-if="lyrics.length" class="fixed inset-0 flex justify-center items-center pointer-events-none">
<div class="h-80 overflow-hidden lyric-mask">
<div :style="{transform:`translateY(-${index*40}px)`}"
class="text-center space-y-4 transition-all duration-300">

<div v-for="(l,i) in lyrics"
:class="i===index ? 'text-xl font-bold text-white' : 'text-white/30'">
{{l.text}}
</div>

</div>
</div>
</div>

<!-- 播放器 -->
<div v-if="current" class="fixed bottom-0 left-0 right-0 bg-black/60 p-3 border-t border-white/10">

<div class="flex justify-between items-center">
<div>
<div class="text-sm">{{current.title}}</div>
<div class="text-xs text-white/50">{{current.artist}}</div>
</div>

<div class="flex gap-3 items-center">
<button @click="fav(current)">❤️</button>
<button @click="toggle" class="text-lg">{{playing?'⏸':'▶'}}</button>
</div>
</div>

<input type="range" min="0" max="100"
v-model="progress" @input="seek"
class="w-full mt-2">

</div>

<audio ref="audio" :src="url"
@timeupdate="update"
@error="onError"></audio>

</div>

<script>
const {createApp,ref,onMounted}=Vue

// 多代理（提高成功率）
const PROXIES=[
"https://api.allorigins.win/raw?url=",
"https://cors.isomorphic-git.org/"
]

// 请求封装
async function req(url,method="GET",data=null){
for(let p of PROXIES){
try{
let full=p+encodeURIComponent(url)
let r=await axios({url:full,method,data})
if(r.data)return r
}catch{}
}
throw "fail"
}

// 数据格式化
function format(v){
return{
songmid:v.mid,
title:v.title,
artist:v.singer?.map(s=>s.name).join("/")||"未知",
artwork:v.album?.mid
?`https://y.gtimg.cn/music/photo_new/T002R300x300M000${v.album.mid}.jpg`
:"https://via.placeholder.com/300"
}
}

createApp({
setup(){

const keyword=ref("")
const songs=ref([])
const hotSongs=ref([])
const current=ref(null)
const url=ref("")
const playing=ref(false)
const audio=ref(null)
const progress=ref(0)

// 歌词
const lyrics=ref([])
const index=ref(0)

// 收藏
const favs=ref(JSON.parse(localStorage.getItem("fav")||"[]"))

function saveFav(){
localStorage.setItem("fav",JSON.stringify(favs.value))
}

function fav(s){
if(!favs.value.find(i=>i.songmid===s.songmid)){
favs.value.push(s)
saveFav()
alert("已收藏")
}
}

// 解析歌词
function parse(lrc){
return lrc.split("\n").map(line=>{
let m=line.match(/\[(\d+):(\d+\.\d+)\]/)
if(!m) return null
return {
time: parseInt(m[1])*60 + parseFloat(m[2]),
text: line.replace(/\[.*?\]/,"")
}
}).filter(Boolean)
}

// 获取歌词
async function getLyric(s){
try{
let r=await req(`https://oiapi.net/api/QQMusicLyric?songmid=${s.songmid}`)
return parse(r.data.lyric||"")
}catch{
return []
}
}

// 播放
async function play(s){
current.value=s
lyrics.value=[]
index.value=0
playing.value=false

// 歌词并发加载
getLyric(s).then(l=>lyrics.value=l)

// 播放地址
let apis=[
`https://api.xunhuisi.store/API/QQMusic/Song.php?mid=${s.songmid}`,
`https://api.vkeys.cn/v2/music/tencent/url?mid=${s.songmid}`
]

for(let a of apis){
try{
let r=await req(a)
let u=r.data.music_url || r.data.data?.url
if(u){
url.value=u
break
}
}catch{}
}

setTimeout(()=>{
audio.value.play().then(()=>{
playing.value=true
}).catch(()=>{
alert("播放失败，换一首试试")
})
},300)
}

// 播放控制
function toggle(){
if(!audio.value)return
if(playing.value){
audio.value.pause()
playing.value=false
}else{
audio.value.play()
playing.value=true
}
}

// 时间更新（进度 + 歌词）
function update(){
if(audio.value.duration){
progress.value = (audio.value.currentTime / audio.value.duration) * 100
}

let t = audio.value.currentTime
for(let i=0;i<lyrics.value.length;i++){
if(t >= lyrics.value[i].time){
index.value = i
}
}
}

// 拖动进度
function seek(){
audio.value.currentTime = (progress.value/100) * audio.value.duration
}

// 搜索
async function search(){
if(!keyword.value.trim()) return
try{
let data={
req_1:{
method:"DoSearchForQQMusicDesktop",
module:"music.search.SearchCgiService",
param:{query:keyword.value,page_num:1,num_per_page:20}
}}
let r=await req("https://u.y.qq.com/cgi-bin/musicu.fcg","POST",data)
songs.value = r.data.req_1.data.body.song.list.map(format)
}catch{
alert("搜索失败")
}
}

// 热门榜
async function hot(){
try{
let data={
req_1:{
module:"musicToplist.ToplistInfoServer",
method:"GetDetail",
param:{toplist_id:26,num:20}
}}
let r=await req("https://u.y.qq.com/cgi-bin/musicu.fcg","POST",data)
hotSongs.value = r.data.req_1.data.songInfoList.map(format)
}catch{
console.log("榜单加载失败")
}
}

// 播放错误
function onError(){
alert("播放失败，可能接口失效")
}

onMounted(hot)

return{
keyword,songs,hotSongs,current,url,playing,progress,audio,
search,play,toggle,update,seek,
lyrics,index,fav,onError
}
}
}).mount("#app")
</script>

</body>
</html>

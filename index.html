<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小钱音乐站</title>

<link rel="stylesheet" href="https://unpkg.com/aplayer/dist/APlayer.min.css">
<script src="https://unpkg.com/aplayer/dist/APlayer.min.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: -apple-system;
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 50px;
}

#player {
    max-width: 900px;
    margin: 40px auto;
}
</style>
</head>

<body>

<h1>🎧 小钱音乐站</h1>
<p>🎮 Game song list</p>

<div id="player"></div>

<script>
const ap = new APlayer({
    container: document.getElementById('player'),
    autoplay: false,
    theme: '#4a6cf7',
    loop: 'all',
    order: 'random',
    volume: 0.7,
    audio: [
        {
            name: '起风了',
            artist: '买辣椒也用券',
            url: 'https://music.163.com/song/media/outer/url?id=1330348068.mp3',
            cover: 'https://p2.music.126.net/9zQZ.jpg'
        },
        {
            name: '光年之外',
            artist: '邓紫棋',
            url: 'https://music.163.com/song/media/outer/url?id=569200213.mp3',
            cover: 'https://p2.music.126.net/9zQZ.jpg'
        }
    ]
});
</script>

</body>
</html>
